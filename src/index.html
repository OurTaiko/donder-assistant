<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定数计算器</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="/coi-serviceworker.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: #eceff1;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #37474f;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.4em;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 0 12px;
            padding-left: 36px;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            font-size: 0.9em;
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
        }

        .search-box input:focus {
            outline: none;
            border-color: #ffffff;
            background: #ffffff;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 0.9em;
        }

        button {
            padding: 0 20px;
            height: 34px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .diff-filter select {
            padding: 0 10px;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
            color: #37474f;
            font-size: 0.9em;
            cursor: pointer;
        }

        .diff-filter select:focus {
            outline: none;
            background: #ffffff;
        }

        .status-bar {
            background: #546e7a;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-info {
            display: flex;
            gap: 30px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.9);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
            background: white;
            position: relative;
            transition: box-shadow 0.2s, outline-color 0.2s;
            outline: 2px dashed #cfd8dc;
            outline-offset: -12px;
        }

        .table-wrapper.drag-over {
            outline-color: #4f83a1;
            box-shadow: inset 0 0 0 9999px rgba(79, 131, 161, 0.08);
        }

        .drop-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 80px 40px;
            color: #90a4ae;
            user-select: none;
            pointer-events: none;
        }

        .drop-placeholder .drop-icon {
            font-size: 3em;
            line-height: 1;
        }

        .drop-placeholder .drop-title {
            font-size: 1.1em;
            font-weight: 500;
            color: #607d8b;
        }

        .drop-placeholder .drop-sub {
            font-size: 0.85em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            background: #78909c;
            color: #ffffff;
            z-index: 10;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85em;
        }

        th[data-col-index] {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th[data-col-index]:hover {
            background: #607d8b;
        }

        .sort-indicator {
            opacity: 0.7;
            font-size: 0.8em;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #333;
            font-size: 1.1em;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        .error-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
        }

        .error-modal-content {
            width: min(640px, 92vw);
            max-height: 70vh;
            overflow: auto;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            padding: 20px;
        }

        .error-modal-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #37474f;
            margin-bottom: 8px;
        }

        .error-modal-message {
            color: #455a64;
            white-space: pre-wrap;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .error-modal-actions {
            display: flex;
            justify-content: flex-end;
        }

        .error-modal-actions button,
        .error-modal-actions button {
            background: #eceff1;
            color: #37474f;
            border-color: #cfd8dc;
        }

        .error-modal-actions button:hover {
            background: #cfd8dc;
            border-color: #b0bec5;
        }

        @media (max-width: 640px) {
            .header h1 {
                display: none;
            }

            .search-box input {
                width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>定数计算器</h1>
        <div class="controls">
            <div class="search-box">
                <span class="search-icon">⌕</span>
                <input type="text" id="searchInput" placeholder="搜索歌曲...">
            </div>            <div class="diff-filter">
                <select id="diffFilter">
                    <option value="all">全部</option>
                    <option value="easy">简单</option>
                    <option value="normal">一般</option>
                    <option value="hard">困难</option>
                    <option value="oni">魔王</option>
                    <option value="edit">魔王(里)</option>
                    <option value="oni+edit" selected>魔王 &amp; 魔王(里)</option>
                </select>
            </div>            <button id="uploadBtn">上传</button>
            <button id="exportBtn">导出</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-info">
            <div class="status-item">
                <span>已加载歌曲:</span>
                <span id="totalSongs" class="status-value">0</span>
            </div>
            <div class="status-item">
                <span>已计算:</span>
                <span id="calculatedSongs" class="status-value">0</span>
            </div>
        </div>
        <div style="flex: 1; max-width: 300px;">
            <div class="progress-bar hidden" id="progressContainer">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="table-wrapper" id="tableWrapper">
            <table>
                <thead>
                    <tr>
                        <th>分类</th>
                        <th>歌曲名</th>
                        <th>难度</th>
                        <th>分支</th>
                        <th>体力</th>
                        <th>复合</th>
                        <th>复合难占比</th>
                        <th>节奏</th>
                        <th>节奏难占比</th>
                        <th>高速</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr id="dropPlaceholderRow">
                        <td colspan="10">
                            <div class="drop-placeholder">
                                <div class="drop-icon">📂</div>
                                <div class="drop-title">将数据文件夹拖入此处</div>
                                <div class="drop-sub">支持包含谱面 JSON 的任意目录结构</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">加载中...</div>
        </div>
    </div>

    <input type="file" id="uploadFolderInput" webkitdirectory directory multiple class="hidden">

    <div class="error-modal hidden" id="errorModal">
        <div class="error-modal-content">
            <div class="error-modal-title" id="errorModalTitle">数据导入失败</div>
            <div class="error-modal-message" id="errorModalMessage"></div>
            <div class="error-modal-actions">
                <button id="errorModalCloseBtn">我知道了</button>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
