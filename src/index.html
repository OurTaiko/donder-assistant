<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#dc4a3a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Donder Assistant</title>
  <link rel="icon" href="%BASE_URL%favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.png">
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest">
  <script type="module">
    if (import.meta.env.PROD) {
      const swScript = document.createElement('script');
      swScript.src = `${import.meta.env.BASE_URL}coi-serviceworker.js`;
      document.head.appendChild(swScript);
    } else if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.unregister());
      });

      if ('caches' in window) {
        caches.keys().then((keys) => {
          keys.forEach((key) => caches.delete(key));
        });
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
