<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定数计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: #eceff1;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #37474f;
            padding: 16px 24px;
            border-bottom: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.4em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 8px 12px;
            padding-left: 36px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            font-size: 0.9em;
            width: 300px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.9);
        }

        .search-box input:focus {
            outline: none;
            border-color: #ffffff;
            background: #ffffff;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 0.9em;
        }

        button {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        button:active {
            background: rgba(255, 255, 255, 0.15);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-bar {
            background: #546e7a;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: none;
        }

        .status-info {
            display: flex;
            gap: 30px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.9);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-value {
            font-weight: 600;
            color: #ffffff;
        }

        .progress-container {
            flex: 1;
            max-width: 300px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
            transition: width 0.3s;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            padding: 0;
        }

        .table-container {
            height: 100%;
            background: white;
            border-radius: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            background: #78909c;
            color: #ffffff;
            z-index: 10;
            border-bottom: none;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85em;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr {
            transition: background-color 0.15s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .category-cell {
            font-weight: 500;
            color: #666;
            font-size: 0.85em;
        }

        .song-cell {
            font-weight: 600;
            color: #333;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            margin: 2px;
        }

        .diff-oni {
            background: #ff4757;
            color: white;
        }

        .diff-hard {
            background: #ffa502;
            color: white;
        }

        .diff-normal {
            background: #2ed573;
            color: white;
        }

        .diff-easy {
            background: #5352ed;
            color: white;
        }

        .rating-cell {
            font-family: 'Consolas', 'Monaco', monospace;
            font-weight: 500;
            color: #333;
            font-size: 0.85em;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #333;
            font-size: 1.1em;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        .export-btn {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .export-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .export-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* 模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: 3em;
            margin-bottom: 16px;
            color: #546e7a;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-message {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-button {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .modal-button-primary {
            background: #546e7a;
            color: white;
        }

        .modal-button-primary:hover {
            background: #607d8b;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .header h1 {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span>定数计算器</span>
        </h1>
        <div class="controls">
            <div class="search-box">
                <span class="search-icon">⌕</span>
                <input type="text" id="searchInput" placeholder="搜索歌曲名称...">
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="difficultySelect" style="color: rgba(255, 255, 255, 0.9); font-weight: 500; font-size: 0.9em;">难度:</label>
                <select id="difficultySelect" style="padding: 8px 12px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 4px; font-size: 0.9em; cursor: pointer; background: rgba(255, 255, 255, 0.9);">
                    <option value="oni_plus_edit" selected>魔王 + 魔王（里）</option>
                    <option value="all">全部难度</option>
                    <option value="oni">魔王 (Oni)</option>
                    <option value="edit">里谱 (Edit)</option>
                    <option value="hard">难 (Hard)</option>
                    <option value="normal">普通 (Normal)</option>
                    <option value="easy">简单 (Easy)</option>
                </select>
            </div>
            <button id="calculateBtn">刷新数据</button>
            <button id="exportBtn" class="export-btn" disabled>导出CSV</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-info">
            <div class="status-item">
                <span>总歌曲数:</span>
                <span class="status-value" id="totalSongs">0</span>
            </div>
            <div class="status-item">
                <span>已计算:</span>
                <span class="status-value" id="calculatedSongs">0</span>
            </div>
        </div>
        <div class="progress-container hidden" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="table-container">
            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>分类</th>
                            <th>歌曲</th>
                            <th class="sortable" data-sort="difficulty" style="cursor: pointer;">难度 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="branchType" style="cursor: pointer;">谱面类型 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="stamina" style="cursor: pointer;">体力定数 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="complex" style="cursor: pointer;">复合定数 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="complexRatio" style="cursor: pointer;">复合占比 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="rhythm" style="cursor: pointer;">节奏定数 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="rhythmRatio" style="cursor: pointer;">节奏占比 <span class="sort-indicator">↕</span></th>
                            <th class="sortable" data-sort="speed" style="cursor: pointer;">高速定数 <span class="sort-indicator">↕</span></th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr>
                            <td colspan="10" style="text-align: center; padding: 40px; color: #999;">
                                点击"开始计算"按钮加载数据...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">正在加载数据...</div>
        </div>
    </div>

    <!-- 数据提示模态框 -->
    <div id="dataModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-icon">⚠</div>
            <div class="modal-title">未检测到数据</div>
            <div class="modal-message">
                请在 <strong>data</strong> 文件夹中放入歌曲数据文件（JSON格式）。<br>
                放置数据后，点击"重试"按钮重新扫描。
            </div>
            <div class="modal-buttons">
                <button class="modal-button modal-button-primary" id="retryButton">重试</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
